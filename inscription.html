<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscription</title>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Montserrat', sans-serif;
    background: #f0f0f0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  .container {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    overflow: hidden;
    width: 780px;
    min-height: 520px;
    display: flex;
  }
  .form-side {
    width: 50%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 40px 36px;
  }
  .overlay-side {
    width: 50%;
    background: linear-gradient(135deg, #2b4bda 0%, #3f91c5 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 40px 32px;
    text-align: center;
    color: white;
  }
  .overlay-side h1 { font-size: 28px; font-weight: 800; margin-bottom: 14px; }
  .overlay-side p { font-size: 13px; line-height: 1.7; margin-bottom: 24px; opacity: 0.9; }
  h1 { font-weight: 800; font-size: 26px; margin-bottom: 16px; color: #222; }
  .social-icons { display: flex; gap: 10px; margin-bottom: 14px; }
  .social-icons a {
    border: 1px solid #ddd; border-radius: 50%;
    width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: #555; text-decoration: none;
    transition: border-color 0.2s, color 0.2s;
  }
  .social-icons a:hover { border-color: #0040ae; color: #82bbd7; }
  .separator { font-size: 12px; color: #999; margin-bottom: 16px; }
  input[type="text"], input[type="email"], input[type="password"], input[type="date"] {
    background: #f4f4f4; border: none; border-radius: 8px;
    padding: 12px 16px; width: 100%; margin-bottom: 10px;
    font-size: 13px; font-family: 'Montserrat', sans-serif;
    outline: none; transition: background 0.2s, box-shadow 0.2s; color: #333;
  }
  input:focus { background: #ffe8e8; box-shadow: 0 0 0 2px #ff444430; }
  input::placeholder { color: #aaa; }
  .input-group { position: relative; width: 100%; }
  .toggle-password {
    position: absolute; right: 12px; top: 50%;
    transform: translateY(-60%); cursor: pointer; font-size: 15px; color: #aaa; user-select: none;
  }
  .error-msg { font-size: 11px; color: #ff4444; margin-top: -6px; margin-bottom: 8px; display: none; width: 100%; }
  .strength-bar { width: 100%; height: 4px; background: #eee; border-radius: 4px; margin-top: -6px; margin-bottom: 10px; overflow: hidden; }
  .strength-fill { height: 100%; width: 0%; border-radius: 4px; transition: width 0.3s, background 0.3s; }
  label.input-label { font-size: 11px; font-weight: 600; color: #888; align-self: flex-start; margin-bottom: 4px; letter-spacing: 0.5px; }
  .btn {
    background: linear-gradient(135deg, #e68517, #ff6b35);
    color: white; border: none; border-radius: 30px;
    padding: 12px 40px; font-size: 13px; font-weight: 700;
    font-family: 'Montserrat', sans-serif; letter-spacing: 1px;
    cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
    text-transform: uppercase; margin-top: 4px;
  }
  .btn:hover { transform: scale(1.04); box-shadow: 0 6px 20px rgba(255,68,68,0.4); }
  .btn-ghost {
    background: transparent; border: 2px solid white; color: white;
    border-radius: 30px; padding: 11px 36px; font-size: 12px; font-weight: 700;
    font-family: 'Montserrat', sans-serif; letter-spacing: 1px; cursor: pointer;
    text-transform: uppercase; transition: background 0.2s, color 0.2s; text-decoration: none;
    display: inline-block;
  }
  .btn-ghost:hover { background: white; color: #ff4444; }
  .success-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.45); z-index: 999; align-items: center; justify-content: center;
  }
  .success-overlay.active { display: flex; }
  .success-box {
    background: white; border-radius: 16px; padding: 44px 52px;
    text-align: center; max-width: 360px; width: 90%; animation: popIn 0.3s ease;
  }
  @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .success-box .icon { font-size: 54px; margin-bottom: 12px; }
  .success-box h2 { font-size: 20px; font-weight: 800; margin-bottom: 8px; color: #222; }
  .success-box p { font-size: 13px; color: #888; margin-bottom: 24px; }
  .countdown { font-weight: 700; color: #ff4444; }
  @media (max-width: 650px) {
    .container { flex-direction: column; width: 95vw; }
    .form-side, .overlay-side { width: 100%; }
    .overlay-side { border-radius: 0 0 16px 16px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="form-side">
    <h1>Créer un compte</h1>
    
    <form id="signupForm" method="post" action="inscription_traitement.php" onsubmit="return handleSignUp();" style="width:100%;">
      <input type="text" id="name" name="nom" placeholder="Nom complet" autocomplete="off">
      <div class="error-msg" id="name-err">Nom requis.</div>
      <input type="email" id="email" name="email" placeholder="Email" autocomplete="off">
    <div class="error-msg" id="email-err">Email invalide.</div>
    <label class="input-label">Date de naissance</label>
    <input type="date" id="dob" max="">
    <div class="error-msg" id="dob-err">Date de naissance requise.</div>
    <div class="input-group">
      <input type="password" id="pass" name="password" placeholder="Mot de passe" oninput="checkStrength(this.value)">
      <span class="toggle-password" onclick="togglePass('pass', this)">👁</span>
    </div>
    <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
    <div class="error-msg" id="pass-err">Min. 6 caractères.</div>
    <div class="input-group">
      <input type="password" id="confirm" placeholder="Confirmer le mot de passe">
      <span class="toggle-password" onclick="togglePass('confirm', this)">👁</span>
    </div>
    <div class="error-msg" id="confirm-err">Les mots de passe ne correspondent pas.</div>
      <button type="submit" class="btn">S'INSCRIRE</button>
    </form>
  </div>
  <div class="overlay-side">
    <h1>Bon retour !</h1>
    <p>Vous avez déjà un compte ? Connectez-vous avec vos informations personnelles.</p>
    <a href="CONNEXION.html" class="btn-ghost">SE CONNECTER</a>
  </div>
</div>
<div class="success-overlay" id="successOverlay">
  <div class="success-box">
    <div class="icon">✅</div>
    <h2>Compte créé !</h2>
    <p>Bienvenue <strong id="welcome-name"></strong> !<br>Redirection dans <span class="countdown" id="countdown">3</span>s...</p>
    <button class="btn" onclick="goToLogin()">SE CONNECTER MAINTENANT</button>
  </div>
</div>
<script>
  document.getElementById('dob').max = new Date().toISOString().split('T')[0];
  function togglePass(id, el) {
    const inp = document.getElementById(id);
    inp.type = inp.type === 'password' ? 'text' : 'password';
    el.textContent = inp.type === 'password' ? '👁' : '🙈';
  }
  function showError(id, show) {
    document.getElementById(id).style.display = show ? 'block' : 'none';
  }
  function checkStrength(val) {
    const fill = document.getElementById('strength-fill');
    let s = 0;
    if (val.length >= 6) s++;
    if (val.length >= 10) s++;
    if (/[A-Z]/.test(val)) s++;
    if (/[0-9]/.test(val)) s++;
    if (/[^A-Za-z0-9]/.test(val)) s++;
    fill.style.width = (s / 5 * 100) + '%';
    fill.style.background = s < 2 ? '#ff4444' : s < 4 ? '#ffaa00' : '#44cc77';
  }
  function isValidEmail(e) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }
  function goToLogin() { window.location.href = 'CONNEXION.html'; }
  function handleSignUp() {
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const dob = document.getElementById('dob').value;
    const pass = document.getElementById('pass').value;
    const confirm = document.getElementById('confirm').value;
    let valid = true;
    if (!name) { showError('name-err', true); valid = false; } else showError('name-err', false);
    if (!isValidEmail(email)) { showError('email-err', true); valid = false; } else showError('email-err', false);
    if (!dob) { showError('dob-err', true); valid = false; } else showError('dob-err', false);
    if (pass.length < 6) { showError('pass-err', true); valid = false; } else showError('pass-err', false);
    if (pass !== confirm || !confirm) { showError('confirm-err', true); valid = false; } else showError('confirm-err', false);
    return valid;
  }
</script>
</body>
</html>
