<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion</title>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Montserrat', sans-serif;
    background: #f0f0f0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  .container {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    overflow: hidden;
    width: 780px;
    min-height: 520px;
    display: flex;
  }
  .overlay-side {
    width: 50%;
    background: linear-gradient(135deg, #00059c 0%, #75b2ef 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 40px 32px;
    text-align: center;
    color: white;
  }
  .overlay-side h1 { font-size: 28px; font-weight: 800; margin-bottom: 14px; }
  .overlay-side p { font-size: 13px; line-height: 1.7; margin-bottom: 24px; opacity: 0.9; }
  .form-side {
    width: 50%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 40px 36px;
  }
  h1 { font-weight: 800; font-size: 26px; margin-bottom: 16px; color: #222; }
  .social-icons { display: flex; gap: 10px; margin-bottom: 14px; }
  .social-icons a {
    border: 1px solid #ddd; border-radius: 50%;
    width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: #555; text-decoration: none;
    transition: border-color 0.2s, color 0.2s;
  }
  .social-icons a:hover { border-color: #ff4444; color: #ff4444; }
  .separator { font-size: 12px; color: #999; margin-bottom: 16px; }
  input[type="email"], input[type="password"] {
    background: #f4f4f4; border: none; border-radius: 8px;
    padding: 12px 16px; width: 100%; margin-bottom: 10px;
    font-size: 13px; font-family: 'Montserrat', sans-serif;
    outline: none; transition: background 0.2s, box-shadow 0.2s; color: #333;
  }
  input:focus { background: #ffe8e8; box-shadow: 0 0 0 2px #ff444430; }
  input::placeholder { color: #aaa; }
  .input-group { position: relative; width: 100%; }
  .toggle-password {
    position: absolute; right: 12px; top: 50%;
    transform: translateY(-60%); cursor: pointer; font-size: 15px; color: #aaa; user-select: none;
  }
  .error-msg { font-size: 11px; color: #ff4444; margin-top: -6px; margin-bottom: 8px; display: none; width: 100%; }
  .forgot { font-size: 12px; color: #888; margin-bottom: 18px; cursor: pointer; align-self: flex-start; }
  .forgot:hover { color: #ff4444; }
  /* Remember me checkbox */
  .remember-me {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    margin-bottom: 18px;
    cursor: pointer;
    user-select: none;
  }
  .remember-me input[type="checkbox"] {
    appearance: none;
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border: 2px solid #ddd;
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    flex-shrink: 0;
  }
  .remember-me input[type="checkbox"]:checked {
    background: linear-gradient(135deg, #eb8410, #ff6b35);
    border-color: #eb8410;
  }
  .remember-me input[type="checkbox"]:checked::after {
    content: '\2713';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    font-size: 11px;
    font-weight: 700;
  }
  .remember-me span {
    font-size: 12px;
    color: #888;
    font-family: 'Montserrat', sans-serif;
  }
  .btn {
    background: linear-gradient(135deg, #eb8410, #ff6b35);
    color: white; border: none; border-radius: 30px;
    padding: 12px 40px; font-size: 13px; font-weight: 700;
    font-family: 'Montserrat', sans-serif; letter-spacing: 1px;
    cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
    text-transform: uppercase;
  }
  .btn:hover { transform: scale(1.04); box-shadow: 0 6px 20px rgba(255,68,68,0.4); }
  .btn-ghost {
    background: transparent; border: 2px solid white; color: white;
    border-radius: 30px; padding: 11px 36px; font-size: 12px; font-weight: 700;
    font-family: 'Montserrat', sans-serif; letter-spacing: 1px; cursor: pointer;
    text-transform: uppercase; transition: background 0.2s, color 0.2s;
    text-decoration: none; display: inline-block;
  }
  .btn-ghost:hover { background: white; color: #ff4444; }
  .success-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.45); z-index: 999; align-items: center; justify-content: center;
  }
  .success-overlay.active { display: flex; }
  .success-box {
    background: white; border-radius: 16px; padding: 44px 52px;
    text-align: center; max-width: 360px; width: 90%; animation: popIn 0.3s ease;
  }
  @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .success-box .icon { font-size: 54px; margin-bottom: 12px; }
  .success-box h2 { font-size: 20px; font-weight: 800; margin-bottom: 8px; color: #222; }
  .success-box p { font-size: 13px; color: #888; margin-bottom: 24px; }
  @media (max-width: 650px) {
    .container { flex-direction: column; width: 95vw; }
    .form-side, .overlay-side { width: 100%; }
    .overlay-side { border-radius: 16px 16px 0 0; order: -1; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="overlay-side">
    <h1>Bonjour !</h1>
    <p>Entrez vos informations personnelles et commencez votre aventure avec nous.</p>
    <a href="inscription.html" class="btn-ghost">S'INSCRIRE</a>
  </div>
  <div class="form-side">
    <h1>Sign in</h1>
    
    <form id="loginForm" method="post" action="traitement.php" onsubmit="return handleSignIn();" style="width:100%;">
      <input type="email" id="email" name="email" placeholder="Email" autocomplete="off">
      <div class="error-msg" id="email-err">Email invalide.</div>
      <div class="input-group">
        <input type="password" id="pass" name="password" placeholder="Mot de passe">
      <span class="toggle-password" onclick="togglePass('pass', this)">👁</span>
    </div>
    <div class="error-msg" id="pass-err">Mot de passe requis.</div>
    
      <label class="remember-me">
        <input type="checkbox" id="rememberMe">
        <span>Se souvenir de moi</span>
      </label>

      <button type="submit" class="btn">SE CONNECTER</button>
    </form>
  </div>
</div>
<div class="success-overlay" id="successOverlay">
  <div class="success-box">
    <div class="icon">✅</div>
    <h2>Connexion réussie !</h2>
    <p>Bienvenue <strong id="welcome-name"></strong> !<br>Vous êtes maintenant connecté.</p>
    <button class="btn" onclick="closeModal()">CONTINUER</button>
  </div>
</div>
<script>
  function togglePass(id, el) {
    const inp = document.getElementById(id);
    inp.type = inp.type === 'password' ? 'text' : 'password';
    el.textContent = inp.type === 'password' ? '\uD83D\uDC41' : '\uD83D\uDE48';
  }
  function showError(id, show) {
    document.getElementById(id).style.display = show ? 'block' : 'none';
  }
  function isValidEmail(e) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }
  function handleSignIn() {
    const email = document.getElementById('email').value.trim();
    const pass = document.getElementById('pass').value;
    const rememberMe = document.getElementById('rememberMe').checked;
    let valid = true;
    if (!isValidEmail(email)) { showError('email-err', true); valid = false; } else showError('email-err', false);
    if (!pass) { showError('pass-err', true); valid = false; } else showError('pass-err', false);
    
    // Save or remove email based on remember me
    if (valid && rememberMe) {
      localStorage.setItem('remembered_email', email);
      localStorage.setItem('remember_me', 'true');
    } else if (valid && !rememberMe) {
      localStorage.removeItem('remembered_email');
      localStorage.removeItem('remember_me');
    }
    
    return valid;
  }
  function closeModal() {
    document.getElementById('successOverlay').classList.remove('active');
  }
  
  // On page load: restore saved email
  document.addEventListener('DOMContentLoaded', function() {
    const savedEmail = localStorage.getItem('remembered_email');
    const isRemembered = localStorage.getItem('remember_me') === 'true';
    
    if (isRemembered && savedEmail) {
      document.getElementById('email').value = savedEmail;
      document.getElementById('rememberMe').checked = true;
      // Auto-focus password field so user can type directly
      document.getElementById('pass').focus();
    }
  });
</script>
</body>
</html>
